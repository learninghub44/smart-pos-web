[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public && cp -r .next/standalone /standalone"

[deploy]
startCommand = "node /app/start.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "smartpos-web"
